<div class="page-content">
  <!-- HEADER -->
  <page-header [header]="{
      title: 'facilities.header.title',
      description: 'facilities.header.description',
      img:{
      src: '/assets/images/outdoor-areas/gardens-03.jpg',
      alt: 'Instalaciones de Villa Los Reyes'
    }
    }" />

  <grid-rooms-section class="split-layout--up" [info]="{
    title: 'facilities.rooms.title',
    description: 'facilities.rooms.description'
  }" [rooms]="[]" />


  

  <!-- RESTAURANTE -->
  <gallery-info-section [mainImage]="{
      src: 'assets/images/restaurant/slide-dining-area-01.jpg',
      alt: 'Bar-Restaurante'
    }" [thumbImages]="[
      { src: 'assets/images/restaurant/slide-bar-area.jpg', alt: 'Bar-Restaurante' },
      { src: 'assets/images/gallery/slide-restaurant.jpg', alt: 'Bar-Restaurante' },
      { src: 'assets/images/restaurant/slide-dining-area-02.jpg', alt: 'Bar-Restaurante' }
    ]" [title]="'facilities.restaurant.title'" [description]="'facilities.restaurant.description'" [reverse]="true"
    [color]="'#E4EAE5'" />

  <!-- JARDINES Y PISCINA -->
  <gallery-info-section [mainImage]="{
      src: 'assets/images/outdoor-areas/gardens-01.jpg',
      alt: 'Jardines y piscina'
    }" [thumbImages]="[
      { src: 'assets/images/outdoor-areas/gardens-02.jpg', alt: 'Jardines y piscina' },
      { src: 'assets/images/outdoor-areas/gardens-03.jpg', alt: 'Jardines y piscina' },
      { src: 'assets/images/outdoor-areas/gardens-04.jpg', alt: 'Jardines y piscina' }
    ]" [title]="'facilities.gardens.title'" [description]="'facilities.gardens.description'" [reverse]="false"
    [color]="'#f7faf7'" />

  <!-- TERRAZA -->
  <gallery-info-section [mainImage]="{
      src: 'assets/images/outdoor-areas/terraces-01.jpg',
      alt: 'Terraza'
    }" [thumbImages]="[
      { src: 'assets/images/outdoor-areas/terraces-02.jpg', alt: 'Terraza' },
      { src: 'assets/images/outdoor-areas/terraces-03.jpg', alt: 'Terraza' },
      { src: 'assets/images/outdoor-areas/terraces-04.jpg', alt: 'Terraza' }
    ]" [title]="'facilities.terrace.title'" [description]="'facilities.terrace.description'" [reverse]="true"
    [color]="'#E4EAE5'" />

</div>
