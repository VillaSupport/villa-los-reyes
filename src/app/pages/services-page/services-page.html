<div class="page-content">

  <!-- ========================
       Header Principal
  ========================= -->
  <page-header
    [head]="{
      title: 'services.header.title',
      description: 'services.header.description'
    }"
    [image]="{
      src: 'assets/images/restaurant/slide-dining-area-01.jpg',
      alt: 'Imagen principal del restaurante y bar de Villa Los Reyes'
    }"
  />

  <!-- ========================
       Gastronomía
  ========================= -->
  <div id="gastronomy" class="fragment-anchor"></div>
  <gallery-info-section
    class="split-layout--up"
    [mainImage]="{
      src: 'assets/images/restaurant/slide-dining-area-01.jpg',
      alt: 'services.sections.0.title - services.header.title'
    }"
    [thumbImages]="[
      { src: 'assets/images/restaurant/slide-bar-area.jpg', alt: 'services.sections.0.title - barra' },
      { src: 'assets/images/gallery/slide-restaurant.jpg', alt: 'services.sections.0.title - restaurante' },
      { src: 'assets/images/restaurant/slide-dining-area-02.jpg', alt: 'services.sections.0.title - comedor' }
    ]"
    [title]="'services.sections.0.title'"
    [description]="'services.sections.0.description'"
    [featuresTitle]="'services.sections.0.features.title'"
    [features]="[
      'services.sections.0.features.items.0',
      'services.sections.0.features.items.1',
      'services.sections.0.features.items.2',
      'services.sections.0.features.items.3',
      'services.sections.0.features.items.4',
      'services.sections.0.features.items.5'
    ]"
  />

  <!-- ========================
       Movilidad
  ========================= -->
  <div id="mobility" class="fragment-anchor"></div>
  <split-layout-section
    [featuresTitle]="'services.sections.1.features.title'"
    [features]="[
      'services.sections.1.features.items.0',
      'services.sections.1.features.items.1',
      'services.sections.1.features.items.2',
      'services.sections.1.features.items.3'
    ]"
    [images]="[
      {src:'assets/images/vehicles/vehicle-01.jpg',alt:'services.sections.1.title - vehículo 1'},
      {src:'assets/images/vehicles/vehicle-02.jpg',alt:'services.sections.1.title - vehículo 2'}
    ]"
    [info]="{
      title: 'services.sections.1.title',
      description: 'services.sections.1.description'
    }"
    [reverse]="true"
    [color]="'#f7faf7'"
  />

  <!-- ========================
       Trip Planner
  ========================= -->
  <div id="tripPlanner" class="fragment-anchor"></div>
  <split-layout-section
    [featuresTitle]="'services.sections.2.features.title'"
    [features]="[
      'services.sections.2.features.items.0',
      'services.sections.2.features.items.1',
      'services.sections.2.features.items.2',
      'services.sections.2.features.items.3'
    ]"
    [images]="[
      {src:'assets/images/amenities/slide-trip-planner.jpg',alt:'services.sections.2.title - planificación de viaje'}
    ]"
    [info]="{
      title: 'services.sections.2.title',
      description: 'services.sections.2.description'
    }"
  />

  <!-- ========================
       Lavandería
  ========================= -->
  <div id="laundry" class="fragment-anchor"></div>
  <split-layout-section
    [featuresTitle]="'services.sections.3.features.title'"
    [features]="[
      'services.sections.3.features.items.0',
      'services.sections.3.features.items.1'
    ]"
    [images]="[
      {src:'assets/images/amenities/slide-laundry.jpg',alt:'services.sections.3.title - lavandería'}
    ]"
    [info]="{
      title: 'services.sections.3.title',
      description: 'services.sections.3.description'
    }"
    [reverse]="true"
    [color]="'#f7faf7'"
  />

  <!-- ========================
       Masajes
  ========================= -->
  <div id="massages" class="fragment-anchor"></div>
  <split-layout-section
    [images]="[
      {src:'/assets/images/amenities/slide-massage.jpg',alt:'services.sections.4.title - masajes'}
    ]"
    [info]="{
      title: 'services.sections.4.title',
      description: 'services.sections.4.description'
    }"
  />

  <!-- ========================
       Clases de baile
  ========================= -->
  <div id="danceClasses" class="fragment-anchor"></div>
  <split-layout-section
    [images]="[
      {src:'assets/images/amenities/slide-dance.jpg',alt:'services.sections.5.title - clases de baile'}
    ]"
    [info]="{
      title: 'services.sections.5.title',
      description: 'services.sections.5.description'
    }"
    [reverse]="true"
    [color]="'#f7faf7'"
  />

</div>
