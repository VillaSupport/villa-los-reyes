<div class="page-content">
  <!-- HEADER -->
  <page-header
    [header]="header"
  />

  <rooms-details-grid
    class="mt-negative"
    [info]="info()"
    [rooms]="roomsData()?.items ?? []"
  ></rooms-details-grid>

  @for (space of spacesData(); track $index; let isEven = $even) {
    @let mainImg = space.images[0];
    @let thumdsImg = space.images.slice(1);
    <gallery-split-view
      [mainImage]="mainImg"
      [thumbImages]="thumdsImg"
      [info]="{ title: space.title, desc: space.desc }"
      [reverse]="isEven"
      [whiteBg]="isEven"
    />
  }
</div>
