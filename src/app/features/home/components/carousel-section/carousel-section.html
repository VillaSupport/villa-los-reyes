<div class="carousel-container">
  @for (slide of slides(); let i = $index; track i) {
    <img
      class="carousel-image"
      [src]="slide.src"
      [alt]="slide.alt | translate"
      [style.display]="current() === i ? 'block' : 'none'"
      [attr.loading]="i === 0 ? 'eager' : 'lazy'"
      [attr.fetchpriority]="i === 0 ? 'high' : 'low'"
    />

    @if (current() === i) {
      <div class="carousel-overlay" (click)="$event.stopPropagation()">
        <div class="text-content">
          <h1>{{ slide.title | translate }}</h1>
          <p>{{ slide.subtitle | translate }}</p>

          <div class="indicator-container">
            @for (slide of slides(); let i = $index; track i) {
              <button
                class="indicator"
                [class.active]="current() === i"
                [style.width.px]="getIndicatorSize(i)"
                [style.height.px]="getIndicatorSize(i)"
                (click)="goToSlide(i)"
              ></button>
            }
          </div>
        </div>

        <div class="left-side">
          <button class="nav-button prev" (click)="prev()">
            <i class="fa-solid fa-angle-left"></i>
          </button>
        </div>

        <div class="right-side">
          <button class="nav-button next" (click)="next()">
            <i class="fa-solid fa-angle-right"></i>
          </button>
        </div>
      </div>
    }
  }
</div>
