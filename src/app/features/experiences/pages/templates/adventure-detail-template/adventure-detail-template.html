<div>
    <page-header 
    [header]="header" 
    [reserveSpace]="false"
    style="--header-bottom-padding: 2.5rem;"
    />

    <!-- TODO:Este componente deberia auto manejar la nulidad de sus valores -->
    @if (mainData()) {
    <detailed-gallery 
        [overlap] = "true" 
        [info]="mainData()!.info" 
        [images]="mainData()!.images"
    />
    }

    <section-nav [prevDisabled]="nav()?.isFirst ?? false" [nextDisabled]="nav()?.isLast ?? false" (onPrev)="goPrev()"
        (onNext)="goNext()">
    </section-nav>

    
    @if (packageConfig().hasPackage) {
      <package-offer
        [slug]="packageConfig().slug"
        [subtitle]="packageConfig().subtitle"
        [baseRoute]="packageConfig().baseRoute"
      />
    }
    
    <room-cross-sell></room-cross-sell>

</div>
