<div class="feature-overview-container">
    <page-header [header]="header()" />

    <div class="categories-wrapper">
        @for (item of items(); track $index; let isFirst = $first; let isEven = $even) {
        <category-preview 
            [category]="item.main"
            [items]="item.previews" 
            [overlap]="isFirst" 
            [reverse]="isEven"
            [whiteBg]="isEven" 
            [basePath]="featureSlug()">
            
        </category-preview>

        }
    </div>

    <div class="packages-area">
        <ng-content select="[packages]"></ng-content>
    </div>

    <div class="cross-selling-area">
        <ng-content select="[crossSelling]"></ng-content>
    </div>

</div>
