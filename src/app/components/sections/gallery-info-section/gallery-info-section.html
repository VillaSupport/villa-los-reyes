<section class="gallery-info-section" [class.reverse]="reverse()" [style.background]="color()">
  <div class="gallery-wrapper">
    <gallery-grid  class="gallery-grid" [mainImage]="mainImage()" [thumbImages]="thumbImages()"
    />

    <div class="info-column">
      <info-panel [title]="title()" [description]="description()" [link]="link()"  />

      @if (featuresTitle() && features()) {
      <feature-list [title]="featuresTitle()!" [features]="features()!" />
      }
    </div>
  </div>
</section>
