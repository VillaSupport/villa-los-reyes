<section class="rooms-section">
  <div class="rooms-container">
    <div class="info-container">
      <info-panel [title]="info().title" [description]="info().description" [slug]="info().link.url" [linkText]="info().link.text">
      </info-panel>
    </div>

    <div class="gallery-wrapper">
      <rooms-gallery [rooms]="rooms()"></rooms-gallery>
    </div>
  </div>
</section>
