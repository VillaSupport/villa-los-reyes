<div class="package-card">
  <img [src]="image()" [alt]="alt() | translate" loading="lazy" />

  <div class="package-overlay">
    
    <div class="card-header">
      <h2>{{ title() | translate }}</h2>
      <p class="duration">{{ duration() | translate }}</p>
    </div>

    <div class="card-footer">
      <p class="description">{{ description() | translate }}</p>
      <div class="price-row">
        <span class="price">$ {{ price() | translate }} </span>
        <span class="per-unit">{{ perUnit() | translate }}</span>
      </div>
    </div>

  </div>
</div>
