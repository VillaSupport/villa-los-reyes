<form class="booking">

  <steps-card [step]="currentStep"></steps-card>

  @switch(currentStep){
  @case(1){<stay-step [stepNumber]="0" (next)="nextStep()" (prev)="previousStep()"></stay-step>}
  @case(2){<contact-step [stepNumber]="1" (next)="nextStep()" (prev)="previousStep()"></contact-step>}
  @case(3){<review-step></review-step>}
  @default{<request-step></request-step>}
  }
</form>
