<div [formGroup]="stayForm" class="card stay-step aligned-grid">


  <h2 class="section-title">Fecha de estancia</h2>
  <h2 class="section-title">Huéspedes</h2>

  <div class="date-field">
    <label for="checkIn">Fecha de entrada</label>
    <div class="date-input-wrapper">
      <span class="material-symbols-outlined date-icon">calendar_month</span>
      <input id="checkIn" type="date" [formControl]="checkInControl"  required />
    </div>
    <validation-feedback [triggerControls]="[checkInControl]"
      [messageSources]="[checkInControl]">
    </validation-feedback>
  </div>

  <div class="guest-row">
    <div class="guest-info">
      <span class="guest-type">Adultos</span>
      <span class="guest-desc">Mayores de 12 años</span>
    </div>
    <div class="counter">
      <button type="button" (click)="decreaseAdult()">
        <span class="material-symbols-outlined remove">do_not_disturb_on</span>
      </button>
      <span class="count">{{ adults }}</span>
      <button type="button" (click)="increaseAdult()">
        <span class="material-symbols-outlined add">add_circle</span>
      </button>
    </div>
  </div>

  <div class="date-field">
    <label for="checkOut">Fecha de salida</label>
    <div class="date-input-wrapper">
      <span class="material-symbols-outlined date-icon">calendar_month</span>
      <input id="checkOut" type="date" [formControl]="checkOutControl" />
    </div>
    <validation-feedback [triggerControls]="[checkOutControl,dateGroup]"
      [messageSources]="[checkOutControl,dateGroup]"></validation-feedback>
  </div>


  <div class="guest-row">
    <div class="guest-info">
      <span class="guest-type">Niños</span>
      <span class="guest-desc">Menores de 12 años</span>
    </div>
    <div class="counter">
      <button type="button" (click)="decreaseChild()">
        <span class="material-symbols-outlined remove">do_not_disturb_on</span>
      </button>
      <span class="count">{{ children}}</span>
      <button type="button" (click)="increaseChild()">
        <span class="material-symbols-outlined add">add_circle</span>
      </button>
    </div>
  </div>



</div>
<div class="wrapper-nav">
  <div class="navigation">
    <button type="button" (click)="onGoBack()" class="nav-btn prev"  [disabled]="stepNumber() === 0">
      <span class="material-symbols-outlined">arrow_back</span> Anterior
    </button>

    <button type="button" (click)="onNextStep()" class="nav-btn next">
      Siguiente <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </div>
</div>
